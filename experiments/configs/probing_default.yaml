# SPDX-License-Identifier: MIT
# Hydra config for exp02_layer_probing.py

seed: 42
n_tables: 100
smoke_test: false
smoke_test_n: 10

data:
  raw_dir: data/raw
  table_subdir: ""

models:
  - bge-small
  - e5-small

pooling: cls  # cls | mean
batch_size: 32

tasks:
  - parent_header
  - cell_coord
  - same_row

probe_types:
  - linear
  - mlp

task_params:
  parent_header:
    n_classes: 8
  cell_coord:
    n_row_buckets: 4
    n_col_buckets: 4
  same_row:
    max_pairs_per_table: 50

probe_params:
  test_size: 0.2

output:
  csv_path: results/tables/exp02.csv
  layer_curve_path: results/figures/exp02_layer_curve.pdf
