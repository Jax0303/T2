# SPDX-License-Identifier: MIT
# Hydra config for exp01_serialization_audit.py

seed: 42
n_tables: 100
smoke_test: false
smoke_test_n: 10

data:
  raw_dir: data/raw
  # HiTab tables are in a subdirectory; adjust if layout differs.
  table_subdir: ""

serializers:
  - html
  - markdown
  - csv
  - json_tree
  - otsl

metrics:
  - teds
  - header_path_accuracy
  - cell_coord_preservation
  - merged_cell_recovery

bootstrap:
  n_resamples: 1000
  confidence_level: 0.95

output:
  csv_path: results/tables/exp01.csv
  markdown_path: results/tables/exp01.md
  boxplot_path: results/figures/exp01_boxplot.pdf
