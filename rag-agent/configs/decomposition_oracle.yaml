# Decomposition + oracle retrieval — isolates cell selection improvement
# from retrieval noise. If decomposition helps here, the gain is real.
llm: "local:Qwen/Qwen2.5-7B-Instruct"
symbolic_llm: null
embedder: "BAAI/bge-large-en-v1.5"
serializer: "plain_markdown"
retriever_device: "cpu"

per_class: 8
top_k_vectors: 20
top_k_tables: 5
seed: 0

extractor: "decomposition"
no_symbolic: false
oracle_retrieval: true

out: "results/decomposition_oracle.json"
